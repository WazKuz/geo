<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Embedded Page</title>
  <style>
    body {
      margin: 0;
      overflow: hidden; /* prevent page scroll */
    }

    .container {
      width: 800px;   /* adjust visible width */
      height: 600px;  /* adjust visible height */
      overflow: hidden; /* crop the iframe */
      position: relative;
    }

    iframe {
      position: absolute;
      top: -100px;   /* crop from top (adjust later) */
      left: -50px;   /* crop from left (adjust later) */
      width: 1200px; /* larger than container */
      height: 1000px;
      border: none;
      pointer-events: auto; /* allow clicking */
    }
  </style>
</head>
<body>

<div class="container">
  <iframe 
    src="https://duck.exampredictor.org/class/geometry-dash">
  </iframe>
</div>

</body>
</html>
